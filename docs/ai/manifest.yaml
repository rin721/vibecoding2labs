  - The project lifecycle downstream detailing workflow is implemented as a project skill, canonical SOP, and durable record template so post-baseline research, task analysis, architecture, mode, Agent infrastructure, slices, implementation, verification, closure, and n+1 reentry remain evidence-backed and recoverable.
  - Compiler or generator specifications provided after bootstrap must be distilled into runtime artifacts through the compiler-runtime assimilation workflow instead of becoming prompt.md or a daily recovery dependency.
