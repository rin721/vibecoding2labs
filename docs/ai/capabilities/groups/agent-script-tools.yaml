schema_id: CapabilityGroup
id: cap_agent_scripts_001
name: "AI Agent script tools"
status: candidate
default_recommendation: "Python CLI tools with typed inputs, structured outputs, and evidence-friendly logs."
candidate_use_cases:
  - "Validate runtime artifacts."
  - "Check Markdown links."
  - "Generate status diagnostics."
  - "Prepare dependency adoption reports."
  - "Repair state pointers inside docs/ai only."
candidate_tools:
  - python
  - typer
  - pydantic
  - pytest
  - ruff
design_rules:
  - "Scripts must be deterministic where possible."
  - "Scripts must avoid secrets and production operations."
  - "Scripts should print concise machine-readable success/failure output."
  - "Any script that mutates files needs an execution slice and rollback plan."
source_urls:
  - https://typer.tiangolo.com/
  - https://docs.pydantic.dev/latest/concepts/models/
  - https://docs.pytest.org/en/stable/getting-started.html
  - https://docs.astral.sh/ruff/linter/

