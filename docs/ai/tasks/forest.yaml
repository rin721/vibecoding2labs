schema_id: TaskForest
forest_id: task_forest_001
created_at: "2026-05-29T17:54:03+08:00"
updated_at: "2026-05-29T22:24:00+08:00"
purpose: "Separate product or business idea task trees from Vibe Coding repository infrastructure task trees."
current_branch: branch_vibe_coding_infra
current_tree: docs/ai/tasks/branches/vibe-coding-infra/tree.yaml
branches:
  - branch_id: branch_mainline_idea
    branch_type: mainline_idea
    tree_id: task_tree_mainline_idea
    path: docs/ai/tasks/main-tree.yaml
    status: waiting_for_confirmed_idea
    owns:
      - "Developer product, application, feature, bugfix, or business goals after requirement confirmation."
      - "Future full-project lifecycle task trees after task-line routing, requirements, research, task analysis, architecture, and mode confirmation."
    does_not_own:
      - "Vibe Coding runtime infrastructure edits."
      - "AGENTS.md, docs/ai/*, schemas, skills, knowledge, evidence, quality gates, and handoff maintenance."
    next_allowed_phase: round_intake[mainline]
  - branch_id: branch_vibe_coding_infra
    branch_type: vibe_coding_infra
    tree_id: task_tree_vibe_coding_infra
    path: docs/ai/tasks/branches/vibe-coding-infra/tree.yaml
    status: pending_acceptance
    owns:
      - "Vibe Coding runtime infrastructure establishment and upgrades."
      - "Documentation, schemas, scripts, quality gates, knowledge entries, project skills, state, evidence, and handoff maintenance."
      - "Workflow governance that controls how future mainline ideas become complete project rounds."
    does_not_own:
      - "Future product or business idea implementation."
      - "Application feature code unrelated to repository governance."
    next_allowed_phase: acceptance[infra_001]
routing_rules:
  - id: route_001
    if_task_changes:
      - AGENTS.md
      - docs/ai/**
      - docs/*.md
      - "runtime validation scripts"
      - "state, evidence, schemas, knowledge, skills, handoff, or quality gates"
    route_to: branch_vibe_coding_infra
    reason: "These tasks iterate the Vibe Coding repository infrastructure."
  - id: route_002
    if_task_represents:
      - "new product idea"
      - "business feature"
      - "application behavior"
      - "user-facing implementation"
    route_to: branch_mainline_idea
    reason: "These tasks belong to the future mainline idea task tree after confirmation."
  - id: route_003
    if_task_represents:
      - "repairing how ideas flow through Vibe Coding"
      - "adding lifecycle gates"
      - "changing the next-step protocol"
      - "changing task-line routing rules"
      - "repairing requirement discovery, requirement planning, or persistent requirement collection"
      - "repairing requirement workflow engines, probe templates, or requirement gathering state locks"
      - "repairing downstream lifecycle gates, execution loops, evidence packets, closure, or n+1 reentry"
      - "assimilating compiler, generator, or macro governance specifications"
    route_to: branch_vibe_coding_infra
    reason: "These tasks change repository governance and agent driving workflow."
compatibility_entry: docs/ai/tasks/tree.yaml
no_prompt_runtime_dependency: true
